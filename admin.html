<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BYSO · admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-panel { max-width: 1000px; margin: 40px auto; padding: 32px; background: var(--card); border-radius: 48px; }
    .hidden { display: none; }
    .admin-login input { padding: 16px; width: 100%; border-radius: 60px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 16px; }
    .admin-btn { background: linear-gradient(130deg, #4d7eff, #b47aff); border: none; padding: 16px 32px; border-radius: 60px; color: white; font-weight: 600; }
    .service-row { display: flex; gap: 10px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
    .cat-block { background: var(--surface); border-radius: 32px; padding: 20px; margin: 24px 0; border: 1px solid var(--border); }
  </style>
</head>
<body class="light-theme">
  <div class="admin-panel">
    <h1><i class="fas fa-lock"></i> admin access</h1>
    <div id="loginBox">
      <input type="password" id="adminPass" placeholder="enter admin password">
      <button class="admin-btn" id="loginBtn">unlock</button>
    </div>
    <div id="adminTools" class="hidden">
      <h2>manage services</h2>
      <div id="categoryList"></div>
      <button class="admin-btn" id="addCategoryBtn">+ new category</button>
      <hr>
      <h3>price checker tool</h3>
      <select id="checkServiceSelect"></select>
      <input type="number" id="checkQty" placeholder="quantity">
      <button id="checkPriceBtn">calculate</button>
      <p id="checkResult"></p>
    </div>
  </div>
  <script>
    // load services from localStorage
    let services = JSON.parse(localStorage.getItem('bysoservices')) || [];
    function saveServices() { localStorage.setItem('bysoservices', JSON.stringify(services)); }

    const PASSWORD = 'md imran 90191123302 bhai sahab';

    document.getElementById('loginBtn').addEventListener('click', () => {
      if (document.getElementById('adminPass').value === PASSWORD) {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('adminTools').classList.remove('hidden');
        renderAdminCategories();
      } else alert('wrong password');
    });

    function renderAdminCategories() {
      const container = document.getElementById('categoryList');
      let html = '';
      services.forEach((cat, catIdx) => {
        html += `<div class="cat-block"><h4><i class="${cat.icon}"></i> ${cat.name} </h4>`;
        cat.services.forEach((s, sIdx) => {
          html += `<div class="service-row">
            <input value="${s.name}" placeholder="name" data-cat="${catIdx}" data-idx="${sIdx}" class="edit-name">
            <input value="${s.min}" type="number" class="edit-min" data-cat="${catIdx}" data-idx="${sIdx}" style="width:70px"> min
            <input value="${s.max}" type="number" class="edit-max" data-cat="${catIdx}" data-idx="${sIdx}" style="width:70px"> max
            <input value="${s.price}" type="number" step="0.0001" class="edit-price" data-cat="${catIdx}" data-idx="${sIdx}" style="width:90px"> 
            <button class="edit-save" data-cat="${catIdx}" data-idx="${sIdx}"><i class="fas fa-save"></i></button>
            <button class="delete-service" data-cat="${catIdx}" data-idx="${sIdx}"><i class="fas fa-trash"></i></button>
          </div>`;
        });
        html += `<button class="add-service-btn" data-cat="${catIdx}">+ add service to ${cat.name}</button></div>`;
      });
      container.innerHTML = html;

      // attach save listeners
      document.querySelectorAll('.edit-save').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const cat = e.target.closest('button').dataset.cat;
          const idx = e.target.closest('button').dataset.idx;
          const row = e.target.closest('.service-row');
          const newName = row.querySelector('.edit-name').value;
          const newMin = parseInt(row.querySelector('.edit-min').value);
          const newMax = parseInt(row.querySelector('.edit-max').value);
          const newPrice = parseFloat(row.querySelector('.edit-price').value);
          services[cat].services[idx] = { ...services[cat].services[idx], name: newName, min: newMin, max: newMax, price: newPrice };
          saveServices(); alert('updated');
        });
      });
      document.querySelectorAll('.delete-service').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const cat = e.target.closest('button').dataset.cat;
          const idx = e.target.closest('button').dataset.idx;
          services[cat].services.splice(idx, 1);
          saveServices(); renderAdminCategories();
        });
      });
      document.querySelectorAll('.add-service-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const cat = e.target.dataset.cat;
          const newService = { id: 's'+Date.now(), name: 'new', min: 10, max: 100, price: 0.01, icon: 'fas fa-star' };
          services[cat].services.push(newService);
          saveServices(); renderAdminCategories();
        });
      });
      // populate price checker
      let opts = '<option>select service</option>';
      services.forEach(cat => cat.services.forEach(s => { opts += `<option value="${s.price}" data-min="${s.min}" data-max="${s.max}">${s.name}</option>`; }));
      document.getElementById('checkServiceSelect').innerHTML = opts;
    }

    document.getElementById('checkPriceBtn').addEventListener('click', () => {
      const sel = document.getElementById('checkServiceSelect');
      const price = parseFloat(sel.value);
      const qty = parseInt(document.getElementById('checkQty').value);
      if (isNaN(qty)) return;
      const min = sel.selectedOptions[0]?.dataset.min || 0;
      const max = sel.selectedOptions[0]?.dataset.max || 0;
      if (qty < min || qty > max) document.getElementById('checkResult').innerText = `❌ quantity out of range (min ${min} max ${max})`;
      else document.getElementById('checkResult').innerText = `✅ expected total: $${(price * qty).toFixed(4)}`;
    });
  </script>
</body>
</html>
