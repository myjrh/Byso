<!DOCTYPE html>
<html>
<head>
<title>BYSO Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

<h2>Admin Login</h2>

<input id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<div id="admin-panel" style="display:none">

<h2>Price Checker</h2>

<input id="qty" placeholder="Quantity">
<input id="price" placeholder="Price Per Unit">

<button onclick="checkPrice()">Calculate</button>

<p id="result"></p>

</div>

<script>

const pass="md imran 90191123302 bhai sahab"

function login(){

let input=document.getElementById("password").value

if(input===pass){

document.getElementById("admin-panel").style.display="block"

}

else{

alert("Wrong Password")

}

}

function checkPrice(){

let q=document.getElementById("qty").value
let p=document.getElementById("price").value

document.getElementById("result").innerText="Expected Price ₹"+(q*p)

}

</script>

</body>
</html>
