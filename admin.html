<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYSO Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header class="header glass">
        <div class="header-left">
            <a href="index.html" class="icon-btn">←</a>
            <h1 class="logo">BYSO Admin</h1>
        </div>
    </header>

    <main id="admin-login-screen" class="admin-login fade-in">
        <div class="glass p-30">
            <h2>Admin Access</h2>
            <input type="password" id="admin-pass" class="input-modern" placeholder="Enter Password">
            <button onclick="checkAdminPassword()" class="cta-btn w-100 mt-20">Login</button>
        </div>
    </main>

    <main id="admin-dashboard" class="fade-in" style="display: none;">
        <section class="glass p-30 mb-30">
            <h2>Price Checker Tool</h2>
            <div class="grid-2">
                <select id="check-service" class="input-modern"></select>
                <input type="number" id="check-qty" class="input-modern" placeholder="Quantity" onkeyup="checkPrice()">
            </div>
            <p class="mt-20">Expected Price: <strong id="check-result">₹0.00</strong></p>
        </section>

        <section class="glass p-30">
            <h2>Manage Services</h2>
            <div class="form-grid mb-30">
                <input type="text" id="add-cat" class="input-modern" placeholder="Category (e.g., Instagram)">
                <input type="text" id="add-icon" class="input-modern" placeholder="Icon (Emoji/URL)">
                <input type="text" id="add-name" class="input-modern" placeholder="Service Name">
                <input type="number" id="add-min" class="input-modern" placeholder="Min Quantity">
                <input type="number" id="add-max" class="input-modern" placeholder="Max Quantity">
                <input type="number" step="0.01" id="add-price" class="input-modern" placeholder="Price Per Unit (₹)">
                <button onclick="addService()" class="cta-btn">Add Service</button>
            </div>

            <div id="admin-service-list"></div>
        </section>
        
        <section class="glass p-30 mt-30">
             <h2>Update Password</h2>
             <input type="text" id="new-pass" class="input-modern" placeholder="New Password">
             <button onclick="updatePassword()" class="cta-btn mt-20">Save Password</button>
        </section>
    </main>
    
    <div id="toast" class="toast glass"></div>
    <script src="script.js"></script>
    <script>
        // Admin specific init
        if(window.location.pathname.includes('admin')){
            document.getElementById('admin-login-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
